spring.application.name=09_Insurance_Project
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/insurance_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:insuranceManagementSecretKeyVeryLongSecure2024ForJWT}
app.jwt.expiration=864000000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Server
server.port=8080

# Logging
logging.level.com.springFirst=DEBUG

# ===================== Cloudinary =====================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ===================== File Upload =====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

app.upload.allowed-types=pdf,jpg,jpeg,png,doc,docx
app.upload.max-file-size-mb=10

# ===================== Mail (SMTP) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===================== OTP =====================
app.otp.expiry-minutes=5
app.otp.max-attempts=5
app.otp.resend-cooldown-seconds=30
app.phone.default-country-code=+91

# ===================== Twilio (Verify API) =====================
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.verify-service-sid=${TWILIO_VERIFY_SERVICE_SID:}
twilio.enabled=${TWILIO_ENABLED:true}